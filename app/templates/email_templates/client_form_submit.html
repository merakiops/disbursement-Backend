    Module:Email-tempalte
    Description:This Email tempalte is used for the return to meraki
 -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Client Submit</title>
</head>
<body style="margin:0; padding:0; font-family: 'Santhoshi', Arial, sans-serif; color:#333333;">
  <center style="width:65%; background-color:#f6f9fc; padding: 90px 150px; ">
    <table cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:600px; background-color:rgb(232, 232, 232);">
      <!-- Logo -->
      <tr>
        <td style="padding:24px 24px 0 0px; ">
          <table width="100%" cellspacing="0" cellpadding="0" style="margin-bottom:20px;">
            <tr>
              <td >
              </td>
              <td>
              </td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Greeting -->
      <tr>
        <td style="padding:0 24px 15px 24px; font-size:14px; line-height:1.6; font-weight:bold; color:#333333;">
          Good Day,
        </td>
      </tr>
      <!-- Intro -->
      <tr>
        <td style="padding:0 24px 15px 24px; font-size:14px; line-height:1.6; color:#333333;">
          &nbsp;Client <strong>{{client_name}}</strong> has submitted PDA/FDA Disbursement Approval Please check now.
        </td>
      </tr>
      <tr>
        <td style="font-size:16px; font-weight:bold; color:#222222; padding:0 24px 15px 24px;">Details:</td>
      <tr>
        <!-- Details -->
      <tr>
        <td style="padding:0 24px 20px 24px;">
          <table cellpadding="0" cellspacing="0" border="0" width="100%"
            style="background-color:#f2f4f8; border:1px solid #e5e7eb; padding:15px;">
            <tr>
              <td style="font-size:14px; font-weight:bold; color:#444444; padding:6px 0px 0px 10px;">Vessel Name</td>
              <td style="font-size:14px; padding:6px 0;">{{vessel_name}}</td>
            </tr>
            <tr>
              <td style="font-size:14px; font-weight:bold; color:#444444; padding:6px 0px 0px 10px;">Port</td>
              <td style="font-size:14px; padding:6px 0;">{{port_name}}</td>
            </tr>
            <tr>
              <td style="font-size:14px; font-weight:bold; color:#444444; padding:6px 0px 0px 10px;">Voyage</td>
              <td style="font-size:14px; padding:6px 0;">{{voyage}}</td>
            </tr>
          </table>
        </td>
      </tr>
      <!-- Footer -->
      <tr>
        <td style="padding:0 24px 15px 24px; font-size:14px; line-height:1.6; color:#333333;">
          For assistance, please reach out to
          <a href="mailto:{{email_id}}" style="color:#3b82f6; text-decoration:none;">{{email_id}}</a>.
        </td>
      </tr>
      <tr>
        
      </tr>
      <tr>
      <td style="padding:0 24px 24px 24px; font-size:14px; line-height:1.6; color:#333333;">
        <strong>Meraki Team</strong>
      </td>

      </tr>
      <!-- Footer Note -->
      <tr>
        <td style="padding:15px 24px 24px 24px; ">
          <p >
          </p>
        </td>
      </tr>
    </table>
  </center>
</body>
</html>
