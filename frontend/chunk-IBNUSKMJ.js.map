<app-loader *ngIf="isLoading()" />
<div class="dialog-header">
<h6>{{ isEditMode ? 'Edit Country' : 'Add Country' }}</h6>
  <button mat-icon-button  class="close-icon" (click)="closeDialog()">
    <mat-icon >close</mat-icon>
  </button>
</div>
<form [formGroup]="countryForm" (ngSubmit)="onSubmit()">
  <mat-form-field appearance="outline" >
    <mat-label>Country Name</mat-label>
    <input matInput formControlName="name"  (keypress)="disallowNumericData($event)"/>
   <mat-error *ngIf="countryForm.get('name')?.hasError('required')">
              Country Name is required.
            </mat-error>
             <mat-error *ngIf="countryForm.get('name')?.hasError('maxength')">
              Max length is 50
             </mat-error>
           
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Currency</mat-label>
    <input matInput formControlName="currency" (keypress)="allowSpecialCharacters($event)"/>
    <mat-error *ngIf="countryForm.get('currency')?.hasError('required')">
              Currency is required.
            </mat-error>
  </mat-form-field>
<div *ngIf="isEditMode">
  <mat-label class="status-label">Status</mat-label>
  <div class="toggle-wrapper">
    <span class="options">Inactive</span>
    <mat-slide-toggle formControlName="status" color="primary" class="custom-toggle"></mat-slide-toggle>
    <span class="options">Active</span>
  </div>  
</div>
  <div>
    <button mat-flat-button color="primary" class="add-country" type="submit"> {{ isEditMode ? 'Update Country' : 'Add Country' }}</button>
  </div>
</form>
