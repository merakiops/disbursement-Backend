<div class="theme-dark page-container">
  <div class="topbar">
    <div class="search-section">
      <mat-form-field class="search-bar" appearance="outline">
        <mat-label>Port Agent Name</mat-label>
        <input matInput [(ngModel)]="searchTerm" (input)="inputSearch()" />
        <mat-icon matSuffix *ngIf="searchTerm" (click)="clearSearch()" class="close-icon">close</mat-icon>
      </mat-form-field>
    </div>
    <button mat-raised-button color="primary" class="add-button" (click)="openAddPortAgentDialog()">
      Add PortAgent
    </button>
  </div>

  <div *ngIf="dataSource?.data as data">
    <ng-container *ngIf="data.length > 0; else noData">
      <div class="table-container" (scroll)="onManualScroll()">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

          <ng-container matColumnDef="Sl.No">
            <th mat-header-cell *matHeaderCellDef>Sl.No</th>
            <td mat-cell *matCellDef="let element; let i = index" style="text-align: center;">{{ i + 1 }}</td>
          </ng-container>

          <ng-container matColumnDef="company_name">
            <th mat-header-cell *matHeaderCellDef>Port Agent</th>
            <td mat-cell *matCellDef="let element" style="text-align: left;">{{ element.company_name }}</td>
          </ng-container>
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <!-- <td mat-cell *matCellDef="let element" class="email-outer-layer">
            <button mat-button color="primary" (click)="openDialog(element)" style="border: 1px solid lightblue;"> View
              Email </button>
          </td> -->
          </ng-container>
          <ng-container matColumnDef="Action">
            <th mat-header-cell *matHeaderCellDef>Action</th>
            <td mat-cell *matCellDef="let element">
              <button class="edit-icon-button" mat-icon-button matTooltip="View more" (click)="openDialog(element)">
                <mat-icon fontSet="material-symbols-outlined">info</mat-icon>
              </button>
              <button class="edit-icon-button" mat-icon-button matTooltip="Edit"
                (click)="openEditPortAgentDialog(element)">
                <mat-icon>edit</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

      </div>
    </ng-container>
  </div>

  <ng-template #noData>
    <div class="no-data-text">
      No data found.
    </div>
  </ng-template>
</div>
