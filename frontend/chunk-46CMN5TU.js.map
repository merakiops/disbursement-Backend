<div class="dialog-header">
  <h6>Payment Instruction</h6>
  <button mat-icon-button class="close-icon" (click)="closeDialog()">
    <mat-icon>close</mat-icon>
  </button>
</div>
<div class="email-dialog">
  <div class="email-section">
    <div class="email-fields">
      <div class="field-container">
        <div class="field-label" style="margin-right: 18px;">
          <mat-label>To:</mat-label>
        </div>
        <div class="field-input">
          <mat-chip-grid #chipGrid>
            <mat-chip-row *ngFor="let email of selectedToEmails" (removed)="removeToEmail(email)">
              {{ email }}
              <button matChipRemove>
                <mat-icon>cancel</mat-icon>
              </button>
            </mat-chip-row>
            <input type="text" placeholder="Add email" matInput [formControl]="to" [matAutocomplete]="autoTo"
              [matChipInputFor]="chipGrid" [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
              (matChipInputTokenEnd)="addToEmail($event)">
          </mat-chip-grid>
          <mat-autocomplete #autoTo="matAutocomplete" (optionSelected)="selectToEmail($event)">
            <mat-option *ngFor="let option of filteredToOptions | async" [value]="option">
              {{ option }}
            </mat-option>
          </mat-autocomplete>
          <div class="validation-message" *ngIf="selectedToEmails.length === 0">
            At least one recipient is required
          </div>
        </div>
      </div>

      <div class="field-container">
        <div class="field-label" style="margin-right: 15px">
          <mat-label>CC:</mat-label>
        </div>
        <div class="field-input">
          <mat-chip-grid #chipGridCc>
            <mat-chip-row *ngFor="let email of selectedCcEmails" (removed)="removeCcEmail(email)">
              {{ email }}
              <button matChipRemove>
                <mat-icon>cancel</mat-icon>
              </button>
            </mat-chip-row>
            <input type="text" placeholder="Add email" matInput [formControl]="cc" [matAutocomplete]="autoCc"
              [matChipInputFor]="chipGridCc" [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
              (matChipInputTokenEnd)="addCcEmail($event)">
          </mat-chip-grid>
          <mat-autocomplete #autoCc="matAutocomplete" (optionSelected)="selectCcEmail($event)">
            <mat-option *ngFor="let option of filteredCcOptions | async" [value]="option">
              {{ option }}
            </mat-option>
          </mat-autocomplete>
        </div>
      </div>
    </div>
    <div class="subject-field-container">
      <div class="subject-field-label">
        <mat-label>Subject:</mat-label>
      </div>
      <div class="subject-field-input">
        <span style="font-weight: 500; color: var(--app-text-primary); font-size: 14px;">{{ subject }}</span>
      </div>
    </div>
    <div class="body-field-container">
      <div class="body-field-label">
        <mat-label>Body:</mat-label>
      </div>
      <div class="body-field-input">
        <div class="email-body-container">
          <div contenteditable="true" class="email-content-editor"
            placeholder="Enter text above table..." #topTextDiv>
            {{ greetingText }}</div>
          <table class="email-table">
            <tr *ngFor="let row of tableData">
              <td class="email-table-label">{{ row.label }}</td>
              <td contenteditable="true" class="email-table-value"
                (blur)="updateTableValue(row, $event)">{{ row.value }}
              </td>
            </tr>
          </table>
          <div contenteditable="true" class="email-content-editor-bottom"
            placeholder="Enter text below table..." #bottomTextDiv [innerHTML]="bottomTextContent"></div>
        </div>
      </div>
    </div>
    <div class="signature-field-container">
      <div class="signature-field-label">
        <mat-label>Signature:</mat-label>
      </div>
      <div class="signature-field-input">
        <div class="signature-error-field">
          <mat-form-field appearance="outline" class="signature-input-field">
            <textarea matInput placeholder="Enter Signature" [formControl]="signature"
              class="signature-input"></textarea>
          </mat-form-field>
          <div class="checkbox-container">
            <mat-checkbox [formControl]="update_signature">Update Signature</mat-checkbox>
          </div>
        </div>
      </div>
    </div>
    <div class="button-section">
      <button mat-flat-button class="cancel-button" (click)="closeDialog()">Cancel</button>
      <button mat-flat-button class="continue-button" [disabled]="selectedToEmails.length === 0"
        (click)="onContinue()">Send</button>
    </div>
  </div>
</div>
