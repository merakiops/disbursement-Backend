<app-loader *ngIf="isLoading()" />
<div class="container">
    <mat-card>
        <div class="form-section">
            <img src="./assets/forgotpassword.svg" alt="Forgot Password Image" />
        </div>
        <div class="image-section">
            <div class="form">

                <!-- Step 1: Enter Username -->
                <div>
                    <div style="text-align: center;">
                        <h3>Forgot password?</h3>
                        <p>No worries, we'll send you reset password link to your email</p>
                    </div>

                    <form [formGroup]="forgotForm" (ngSubmit)="onSubmitUsername()">
                        <mat-form-field appearance="outline" class="compact-form-field">
                            <mat-label>Username</mat-label>
                            <input matInput type="text" placeholder="Enter your username" formControlName="username" />
                            <mat-error *ngIf="forgotForm.get('username')?.hasError('required')">
                                Username is required.
                            </mat-error>
                        </mat-form-field>

                            <button mat-raised-button class="request-button" type="submit" [disabled]="forgotForm.invalid"
                                [ngClass]="{'disabled-button': forgotForm.invalid}">
                                Request Link
                            </button>
                        <a routerLink="/login" class="backToLogin">Back to login</a>
                    </form>
                </div>
            </div>
        </div>
    </mat-card>
</div>
