<div [formGroup]="form">
    <mat-form-field appearance="outline" class="mat-field-small">
        <mat-label>{{ label }}</mat-label>
        <!-- <input matInput [ngxMatDatetimePicker]="picker" ngxMatDatetimePickerInput [formControlName]="fieldValue" /> -->
        <input matInput [ngxMatDatetimePicker]="picker" ngxMatDatetimePickerInput [formControlName]="fieldValue" />
        <!-- Datepicker Toggle -->
        <ngx-mat-datepicker-toggle matSuffix [for]="picker">
            <mat-icon ngxMatDatepickerToggleIcon>event</mat-icon>
        </ngx-mat-datepicker-toggle>
        <!-- Datepicker -->
        <ngx-mat-datetime-picker #picker [showSpinners]="true" [showSeconds]="false" [touchUi]="false" [stepHour]="1"
            [stepMinute]="1" [stepSecond]="1" [enableMeridian]="false">
        </ngx-mat-datetime-picker>
    </mat-form-field>
</div>
