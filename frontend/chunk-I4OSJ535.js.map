<!-- Logo  in sidebar act based on expanded and colapsed by Rahul-->
<img src="https://meraki-disbursement.s3.us-east-1.amazonaws.com/static_objects/meraki_logo.jpeg" [class.collapsed]="!collapsed" [class.expanded]="collapsed" style="margin-top: -7px !important;">

<!-- sidebar item List by Rahul-->
<mat-nav-list>
    <!-- sidebar item List by Rahul-->
    <a *ngFor="let item of menuItems" mat-list-item [routerLink]="item.route"
    [class.active-link]="isActiveRoute(item.route)" class="custom-nav-link" style="border-radius: 0px !important;"
        matTooltip={{!collapsed?item.label:null}} [matTooltipPosition]="position.value!">
        <mat-icon class="material-symbols-outlined" matListIcon>{{ item.icon }}</mat-icon>
        <span class="label">{{ item.label }}</span>
    </a>
    <!-- sidebar item List by Rahul-->

    <!-- Footer Logout Button -->
    <div style="bottom: 10px;position: absolute;border-top:1px solid #d6d5d5;width: 100%;overflow: hidden;">
        <button mat-button style="border: 0px;background-color: transparent; color: var(--color-white);" matTooltip={{!collapsed?logoutTitle:null}}
            [matTooltipPosition]="position.value!" (click)="logout()">
            <mat-icon class="material-symbols-outlined">logout</mat-icon>
            <span *ngIf="collapsed">{{logoutTitle}}</span>
        </button>
    </div>
    <!-- Footer Logout Button -->
</mat-nav-list>
