<!-- Top NavBar to show profile and breadcrumb by Rahul -->
<mat-toolbar color="primary" class="mat-elevation-z3">
    <button mat-icon-button class="toggle-btn" (click)="toggleFn?.()">
        <mat-icon fontSet="material-symbols-outlined">{{ collapsed ? 'right_panel_close' : 'left_panel_close'
            }}</mat-icon>
    </button>
    <div class="breadcrumb-container">
        <ng-container *ngFor="let breadcrumb of breadcrumbs; let last = last">
            <ng-container *ngIf="!last">
                <a [routerLink]="breadcrumb.url" class="title">{{ breadcrumb.label }}</a>
                <!-- This adds the "/" between breadcrumbs -->
                <span *ngIf="!last" class="title">/&nbsp;&nbsp;
                </span>
            </ng-container>
            <div *ngIf="last" class="title-active">
                {{ breadcrumb.label }}
            </div>
        </ng-container>
    </div>
    <span class="center-text">
        Meraki Greatlakes Shipping and Technical Management L.L.C-FZ
    </span>
    <div class="spacer"></div>
    <!-- Profile Button with Menu by Gokul-->
    <button mat-button class="profile-btn" [matMenuTriggerFor]="profileMenu" style="cursor: pointer;">
        <div style="display: flex;">
            <span class="avatar-circle">{{ loggedInUser.charAt(0).toUpperCase() }}</span>

            <span style="text-align: left;">
                <div style="margin-top:5px;margin-bottom: -10px;">
                    {{loggedInUser | titlecase}}
                </div>
                <small style="font-weight: 500;">{{loggedInUserRole}}</small>
            </span>
            <mat-icon class="material-symbols-outlined" style="margin-top: 15px;margin-left: 5px;">
                stat_minus_1
            </mat-icon>
        </div>
    </button>

    <mat-menu #profileMenu="matMenu">
        <button mat-menu-item (click)="openChangePasswordDialog()">
            <mat-icon>settings</mat-icon>
            <span class="menu-text">Change Password</span>
        </button>
        <!-- <button mat-menu-item>
            <mat-icon>person</mat-icon>
            <span>Profile</span>
        </button> -->
        <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span class="menu-text">Logout</span>
        </button>
    </mat-menu>
</mat-toolbar>
