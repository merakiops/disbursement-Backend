<mat-sidenav-container class="layout-container" [class.special-route]="isSpecialRoute()">
    <!-- sidenavbar item list container by Rahul-->
    <mat-sidenav opened="isSidebarOpen()" mode="side" class="sidenav"
        [class.special-route]="isSpecialRoute()"
        [style.width]="isSidebarOpen() ? '230px' : '65px'">
        <!-- sidenavbar item list component by Rahul-->
        <app-sidebar [collapsed]="isSidebarOpen()" />
        <!-- sidenavbar item list component -->
    </mat-sidenav>
    <!-- sidenavbar Content by Rahul-->
    <mat-sidenav-content [ngStyle]="isSidebarOpen() ? expandedStyle : defaultStyle" style="margin-left: '65px';">
        <!-- navbar component by Rahul -->
        <app-navbar [toggleFn]="toggleSidebar" [collapsed]="!isSidebarOpen()" />
        <!-- navbar component by Rahul -->
        <!-- main content area for router by Rahul -->
        <div class="main-content" [class.special-route]="isSpecialRoute()">
            <router-outlet></router-outlet>
        </div>
        <!-- main content area for router by Rahul -->
    </mat-sidenav-content>
    <!-- sidenavbar Content -->
</mat-sidenav-container>
