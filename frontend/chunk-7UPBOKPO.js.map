<div style="overflow-x: hidden;" class="theme-dark">
    <div class="topbar topbar-margin">
        <div class="search-section" style="margin-left: -10px;">
            <mat-form-field class="search-bar" appearance="outline" style="margin-bottom: 0px;">
                <!-- <mat-label>Search disbursement ...</mat-label> -->
                <input matInput placeholder="Search disbursement ..." [(ngModel)]="searchTerm"
                    (input)="inputSearch()" />
            </mat-form-field>
            <button class="search-icon" mat-icon-button (click)="onSearch()">
                <mat-icon class="search">search</mat-icon>
            </button>
        </div>
        <div>
            <!-- <button mat-icon-button class="filter-button mat-elevation-z4">
                <span class="avatar-circle">
                    <mat-icon fontSet="material-symbols-outlined"
                        style="margin: 4px;margin-top: 11px;">filter_alt</mat-icon>
                </span></button> -->
        </div>
    </div>

    <div style="overflow-x: auto;" *ngIf="datasource.data.length > 0; else noData">
        <!-- <ng-container *ngIf="data.length > 0; else noData"> -->
        <div class="table-container" (scroll)="onManualScroll()" style="max-height: 86vh!important;">
            <table mat-table [dataSource]="datasource" multiTemplateDataRows class="mat-elevation-z8">


                @for (column of columnsToDisplay; track column) {
                <ng-container matColumnDef="{{column.property}}">
                    <th mat-header-cell *matHeaderCellDef>{{column.name}}</th>
                    @if(column.property!='status') {<td mat-cell *matCellDef="let element" style="text-align: center;"
                        [ngStyle]="{'color': column.property=='pda_amount' ? '#007AFF' : 'inherit', 'font-weight': column.property=='pda_amount' ? '500' : 'inherit'}"
                        (click)="onClick(element); $event.stopPropagation()">
                        {{element[column.property]}}</td>}
                    @else{ <td mat-cell *matCellDef="let element" style="text-align: center;"
                        (click)="onClick(element); $event.stopPropagation()">
                        <span class="statusColumn" [ngStyle]="{'background': element.status_background_color,
                        'color': element.status_text_color}">{{element[column.property]}}</span>
                    </td>}
                </ng-container>
                }

                <!-- <ng-container matColumnDef="expand">
                        <th mat-header-cell *matHeaderCellDef aria-label="row actions">Action</th>
                        <td mat-cell *matCellDef="let element">
                            <mat-icon aria-label="expand row" (click)="toggle(element); $event.stopPropagation()"
                                [class.example-toggle-button-expanded]="isExpanded(element)"
                                style="margin-top: 3px;margin-bottom: -10px;">{{isExpanded(element)?'expand_less':'chevron_right'}}</mat-icon>
                        </td>
                    </ng-container> -->

                <ng-container matColumnDef="expandedDetail">
                    <td mat-cell *matCellDef="let element" [attr.colspan]="columnsToDisplayOnly.length"
                        class="expanded-content-cell">
                        <div class="example-element-detail-wrapper">
                            <div class="example-element-detail">
                                <div class="expanded-wrapper">
                                    <!-- <app-disburs-dtls-comp [disbursement_obj]="element"></app-disburs-dtls-comp> -->
                                </div>
                            </div>
                        </div>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="columnsToDisplayOnly;sticky:true"></tr>
                <tr mat-row *matRowDef="let element; columns: columnsToDisplayOnly;" class="example-element-row">
                </tr>
                <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="example-detail-row"></tr>
            </table>
        </div>
        <!-- </ng-container> -->
    </div>

    <ng-template #noData>
        <div class="no-data-text">
            No disbursement found.
        </div>
    </ng-template>
</div>
