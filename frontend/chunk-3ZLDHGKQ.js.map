<form class="form" action="">
  <mat-card class="example-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>Return PDA to Meraki</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p class="subtitle">If this PDA was not intended for you, please provide your remarks below.</p>

      <p>Remark <span style="
    font-size: xx-small;
    color: gray;">Please explain why you're returning this PDA (minimum 10 characters)...</span></p>
      <mat-form-field class="example-full-width" appearance="outline">
        <textarea matInput [formControl]="remarkControl" rows="6"></textarea>
      </mat-form-field>
      <mat-error *ngIf="remarkControl.hasError('required') && remarkControl.touched">
        Please enter the remarks
      </mat-error>
    </mat-card-content>
  </mat-card>
  <button mat-flat-button class="button_click" color="primary" (click)="goToBankForm()">
    Cancel
  </button>
  <button mat-flat-button class="button_click" color="primary" (click)="returnToMeraki()">
    Send
  </button>
</form>
