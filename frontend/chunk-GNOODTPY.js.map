<div class="container theme-dark">
  <mat-grid-list cols="3" rowHeight="20vh" gutterSize="13px">
    <mat-grid-tile *ngFor="let item of tiles">
      <div class="tile-content" (click)="navigate(item.route, item.title)">
        <div class="left">
          <mat-icon class="material-symbols-outlined" fontSet="material-symbols-outlined">{{ item.icon }}</mat-icon>
        </div>
        <div class="right">
          <h5>{{ item.title }}</h5>
          <p>{{ item.description }}</p>
          <div class="button-container">
            <button mat-stroked-button class="add-button" (click)="openDialog(item.title); $event.stopPropagation()">+ Add</button>
          </div>
        </div>
      </div>
    </mat-grid-tile>
  </mat-grid-list>
</div>
