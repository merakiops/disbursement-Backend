<div class="topbar">
  <div class="search-section">
    <mat-form-field class="search-bar" appearance="outline">
      <mat-label>User Name</mat-label>
      <input matInput [(ngModel)]="searchTerm" (input)="inputSearch()" />
      <mat-icon matSuffix *ngIf="searchTerm" (click)="clearSearch()" class="close-icon">close</mat-icon>
    </mat-form-field>
  </div>
  <button mat-raised-button color="primary" class="add-button" (click)="openAddCargoDialog()">
    Add User
  </button>
</div>

<div *ngIf="dataSource?.data as data">
  <ng-container *ngIf="data.length > 0; else noData">
    <div class="table-container" (scroll)="onManualScroll()">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <ng-container matColumnDef="Sl.No">
          <th mat-header-cell *matHeaderCellDef>Sl.No</th>
          <td mat-cell *matCellDef="let element; let i = index" style="text-align: center;">{{ i + 1 }}</td>
        </ng-container>
        <!-- Full name -->
        <ng-container matColumnDef="Full Name">
          <th mat-header-cell *matHeaderCellDef>Full Name</th>
          <td mat-cell *matCellDef="let element" style="text-align: left;">{{ element.name }}</td>
        </ng-container>

        <!-- user name -->
        <ng-container matColumnDef="User Name">
          <th mat-header-cell *matHeaderCellDef>User Name</th>
          <td mat-cell *matCellDef="let element" style="text-align: left;">{{ element.username }}</td>
        </ng-container>
        <!-- Role -->
        <ng-container matColumnDef="Role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let element" style="text-align: left;">{{ element.role_name }}</td>
        </ng-container>
        <!--Company -->
        <ng-container matColumnDef="Company">
          <th mat-header-cell *matHeaderCellDef>Company</th>
          <td mat-cell *matCellDef="let element" style="text-align: left;">{{ element.company_name }}</td>
        </ng-container>
        <!-- MFA Enabled -->
        <ng-container matColumnDef="MFA Enabled">
          <th mat-header-cell *matHeaderCellDef>MFA Enabled</th>
          <td mat-cell *matCellDef="let element" style="text-align: left;">{{ element.is_mfa_enabled }}</td>
        </ng-container>
        <!-- Email -->
        <ng-container matColumnDef="Email Address">
          <th mat-header-cell *matHeaderCellDef>Email Address</th>
          <td mat-cell *matCellDef="let element" style="text-align: left;">{{ element.email }}</td>
        </ng-container>
        <!-- status -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> status </th>
          <td mat-cell *matCellDef="let element"> <span [ngClass]="
             element.status === 'Y' ? 'status-active' :
             element.status === 'B' ? 'status-blocked' :
              'status-inactive' "></span> </td>
        </ng-container>
        <!-- Reset button -->
        <ng-container matColumnDef="Reset button">
          <th mat-header-cell *matHeaderCellDef> Reset button </th>
          <td mat-cell *matCellDef="let element">
            <button class="reset-icon-button" mat-icon-button (click)="resetPassword(element.username)">
              <mat-icon class="reset-icon">lock_reset</mat-icon>
            </button>
          </td>
        </ng-container>



        <ng-container matColumnDef="Action">
          <th mat-header-cell *matHeaderCellDef>Action</th>
          <td mat-cell *matCellDef="let element">
            <button class="edit-icon-button" mat-icon-button (click)="openEditCargoDialog(element)">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky:true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

    </div>
  </ng-container>
</div>

<ng-template #noData>
  <div class="no-data-text">
    No data found.
  </div>
</ng-template>
